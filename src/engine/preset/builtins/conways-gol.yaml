# Conway's Game of Life — GPU-native via Python transpiler → IR → WGSL.

schema_version: "1"

meta:
  name: "Conway's Game of Life"
  author: "John Conway"
  description: "The classic cellular automaton. Cells live or die based on neighbor count."
  tags: ["classic", "2d", "binary"]

grid:
  dimensionality: "2d"
  width: 128
  height: 128
  topology: "toroidal"

cell_properties:
  - name: "alive"
    type: "bool"
    default: 0
    role: "input_output"

rule:
  type: "webgpu"
  compute: |
    n = neighbor_sum_alive
    if n == 3 or (alive > 0.5 and n >= 2 and n < 4):
        self.alive = 1.0
    else:
        self.alive = 0.0

visual_mappings:
  - property: "alive"
    channel: "color"
    mapping:
      "0": "#000000"
      "1": "#00ff00"

initial_state:
  type: "script"
  code: |
    const buf = buffers.alive;
    for (let i = 0; i < width * height; i++) {
      if (Math.random() < 0.2) buf[i] = 1;
    }

ai_context:
  description: "Conway's Game of Life with standard B3/S23 rules"
  hints:
    - "A cell is born if it has exactly 3 live neighbors"
    - "A cell survives if it has 2 or 3 live neighbors"
    - "All other cells die or stay dead"
