# Rule 110 Elementary Cellular Automaton — GPU-native via Python transpiler → IR → WGSL.

schema_version: "1"

meta:
  name: "Rule 110"
  author: "Stephen Wolfram"
  description: "1D elementary cellular automaton Rule 110 — proven Turing-complete."
  tags: ["1d", "elementary", "turing-complete"]

grid:
  dimensionality: "1d"
  width: 256
  topology: "finite"

cell_properties:
  - name: "state"
    type: "bool"
    default: 0
    role: "input_output"

params:
  - name: "ruleNumber"
    label: "Rule Number"
    type: "int"
    default: 110
    min: 0
    max: 255
    step: 1

rule:
  type: "webgpu"
  compute: |
    left = neighbor_at(-1, 0, state)
    right = neighbor_at(1, 0, state)
    pattern = left * 4.0 + state * 2.0 + right
    self.state = floor(env_ruleNumber / pow(2.0, pattern)) % 2.0

visual_mappings:
  - property: "state"
    channel: "color"
    mapping:
      "0": "#ffffff"
      "1": "#000000"

ai_context:
  description: "Elementary cellular automaton Rule 110"
  hints:
    - "Each cell looks at itself and its two neighbors"
    - "The 3-bit pattern indexes into the binary representation of the rule number"
    - "Rule 110 is Turing-complete"
