# Navier-Stokes Fluid Dynamics — GPU-native via Python transpiler → IR → WGSL.

schema_version: "1"

meta:
  name: "Navier-Stokes Fluid Dynamics"
  author: "Lattice Engine"
  description: "Simplified 2D Navier-Stokes fluid simulation using a lattice-based diffusion and advection model."
  tags: ["2d", "continuous", "fluid", "navier-stokes", "physics"]

grid:
  dimensionality: "2d"
  width: 64
  height: 64
  topology: "toroidal"

cell_properties:
  - name: "vx"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "vy"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "density"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "pressure"
    type: "float"
    default: 0.0
    role: "input_output"

params:
  - name: "viscosity"
    label: "Viscosity"
    type: "float"
    default: 0.1
    min: 0.0
    max: 1.0
    step: 0.01
  - name: "diffusion"
    label: "Diffusion"
    type: "float"
    default: 0.05
    min: 0.0
    max: 0.5
    step: 0.01
  - name: "dt"
    label: "Time Step"
    type: "float"
    default: 0.5
    min: 0.01
    max: 2.0
    step: 0.1

rule:
  type: "webgpu"
  compute: |
    lap_vx = neighbor_at(0,-1,vx) + neighbor_at(0,1,vx) + neighbor_at(-1,0,vx) + neighbor_at(1,0,vx) - 4.0 * vx
    lap_vy = neighbor_at(0,-1,vy) + neighbor_at(0,1,vy) + neighbor_at(-1,0,vy) + neighbor_at(1,0,vy) - 4.0 * vy
    lap_d = neighbor_at(0,-1,density) + neighbor_at(0,1,density) + neighbor_at(-1,0,density) + neighbor_at(1,0,density) - 4.0 * density
    dpdx = (neighbor_at(1,0,pressure) - neighbor_at(-1,0,pressure)) * 0.5
    dpdy = (neighbor_at(0,1,pressure) - neighbor_at(0,-1,pressure)) * 0.5
    n_vx = neighbor_at(0,-1,vx) + neighbor_at(0,1,vx) + neighbor_at(-1,0,vx) + neighbor_at(1,0,vx)
    n_vy = neighbor_at(0,-1,vy) + neighbor_at(0,1,vy) + neighbor_at(-1,0,vy) + neighbor_at(1,0,vy)
    div_v = (n_vx - 4.0 * vx) + (n_vy - 4.0 * vy)
    new_vx = clamp((vx + env_dt * (env_viscosity * lap_vx - dpdx)) * 0.999, -10.0, 10.0)
    new_vy = clamp((vy + env_dt * (env_viscosity * lap_vy - dpdy)) * 0.999, -10.0, 10.0)
    self.vx = new_vx
    self.vy = new_vy
    new_d = clamp(density + env_dt * (env_diffusion * lap_d - density * div_v * 0.01), 0.0, 10.0)
    self.density = new_d
    self.pressure = clamp(pressure + env_dt * (-div_v * 0.5), -10.0, 10.0)
    d = clamp(new_d, 0.0, 2.0) * 0.5
    spd = clamp(sqrt(new_vx * new_vx + new_vy * new_vy) * 2.0, 0.0, 1.0)
    self.colorR = spd * 0.4
    self.colorG = d * 0.8 + spd * 0.3
    self.colorB = d

visual_mappings:
  - property: "density"
    channel: "color"
    mapping:
      min: "#000033"
      max: "#00ccff"

ai_context:
  description: "Simplified 2D Navier-Stokes fluid simulation"
  hints:
    - "Velocity (vx, vy) advects density"
    - "Viscosity diffuses velocity"
    - "Pressure gradient drives flow from high to low pressure"
    - "This is a simplified model — real NS solvers use projection methods"
