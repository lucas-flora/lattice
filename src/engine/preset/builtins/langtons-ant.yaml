# Langton's Ant — GPU-native via Python transpiler → IR → WGSL.
# Uses neighbor_at() for directional neighbor reads.

schema_version: "1"

meta:
  name: "Langton's Ant"
  author: "Chris Langton"
  description: "A 2D Turing machine where an ant moves on a grid, flipping cell colors and turning."
  tags: ["2d", "ant", "turing-machine"]

grid:
  dimensionality: "2d"
  width: 128
  height: 128
  topology: "toroidal"

cell_properties:
  - name: "color"
    type: "bool"
    default: 0
    role: "input_output"
  - name: "ant"
    type: "bool"
    default: 0
    role: "input_output"
  - name: "ant_dir"
    type: "int"
    default: 0
    role: "input_output"

rule:
  type: "webgpu"
  compute: |
    new_color = color
    new_ant = 0.0
    new_dir = 0.0
    if ant > 0.5:
        new_color = 1.0 - color
    na = neighbor_at(0, -1, ant)
    if na > 0.5:
        d0 = (neighbor_at(0, -1, ant_dir) + 1.0 + 2.0 * neighbor_at(0, -1, color)) % 4.0
        if d0 > 1.5 and d0 < 2.5:
            new_ant = 1.0
            new_dir = d0
    nb = neighbor_at(1, 0, ant)
    if nb > 0.5:
        d1 = (neighbor_at(1, 0, ant_dir) + 1.0 + 2.0 * neighbor_at(1, 0, color)) % 4.0
        if d1 > 2.5 and d1 < 3.5:
            new_ant = 1.0
            new_dir = d1
    nc = neighbor_at(0, 1, ant)
    if nc > 0.5:
        d2 = (neighbor_at(0, 1, ant_dir) + 1.0 + 2.0 * neighbor_at(0, 1, color)) % 4.0
        if d2 < 0.5:
            new_ant = 1.0
            new_dir = d2
    nl = neighbor_at(-1, 0, ant)
    if nl > 0.5:
        d3 = (neighbor_at(-1, 0, ant_dir) + 1.0 + 2.0 * neighbor_at(-1, 0, color)) % 4.0
        if d3 > 0.5 and d3 < 1.5:
            new_ant = 1.0
            new_dir = d3
    self.color = new_color
    self.ant = new_ant
    self.ant_dir = new_dir

visual_mappings:
  - property: "color"
    channel: "color"
    mapping:
      "0": "#ffffff"
      "1": "#000000"
  - property: "ant"
    channel: "color"
    mapping:
      "1": "#ff0000"

ai_context:
  description: "Langton's Ant — a 2D Turing machine on a grid"
  hints:
    - "On a white cell: turn right 90 degrees, flip color, move forward"
    - "On a black cell: turn left 90 degrees, flip color, move forward"
    - "After ~10000 steps, the ant creates a repeating 'highway' pattern"
