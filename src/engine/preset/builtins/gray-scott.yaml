# Gray-Scott Reaction-Diffusion — GPU-native via Python transpiler → IR → WGSL.

schema_version: "1"

meta:
  name: "Gray-Scott Reaction-Diffusion"
  author: "Peter Gray & Stephen Scott"
  description: "Reaction-diffusion system producing spots, stripes, and labyrinthine patterns."
  tags: ["2d", "continuous", "reaction-diffusion"]

grid:
  dimensionality: "2d"
  width: 128
  height: 128
  topology: "toroidal"

brushes:
  - name: "Seed B"
    properties:
      v: { value: 1.0, mode: "set" }
    radius: 5
    shape: "circle"
    falloff: "smooth"

  - name: "Clear"
    properties:
      u: { value: 1.0, mode: "set" }
      v: { value: 0.0, mode: "set" }
    radius: 8
    shape: "circle"
    falloff: "smooth"

cell_properties:
  - name: "u"
    type: "float"
    default: 1.0
    role: "input_output"
  - name: "v"
    type: "float"
    default: 0.0
    role: "input_output"

params:
  - name: "Du"
    label: "Diffusion U"
    type: "float"
    default: 0.2097
    min: 0.0
    max: 1.0
    step: 0.001
  - name: "Dv"
    label: "Diffusion V"
    type: "float"
    default: 0.105
    min: 0.0
    max: 1.0
    step: 0.001
  - name: "F"
    label: "Feed Rate"
    type: "float"
    default: 0.037
    min: 0.0
    max: 0.1
    step: 0.001
  - name: "k"
    label: "Kill Rate"
    type: "float"
    default: 0.06
    min: 0.0
    max: 0.1
    step: 0.001
  - name: "dt"
    label: "Time Step"
    type: "float"
    default: 1.0
    min: 0.1
    max: 2.0
    step: 0.1

rule:
  type: "webgpu"
  compute: |
    lap_u = neighbor_at(0, -1, u) + neighbor_at(0, 1, u) + neighbor_at(-1, 0, u) + neighbor_at(1, 0, u) - 4.0 * u
    lap_v = neighbor_at(0, -1, v) + neighbor_at(0, 1, v) + neighbor_at(-1, 0, v) + neighbor_at(1, 0, v) - 4.0 * v
    uvv = u * v * v
    self.u = clamp(u + env_dt * (env_Du * lap_u - uvv + env_F * (1.0 - u)), 0.0, 1.0)
    self.v = clamp(v + env_dt * (env_Dv * lap_v + uvv - (env_F + env_k) * v), 0.0, 1.0)

visual_mappings:
  - property: "v"
    channel: "color"
    type: "ramp"
    range: [0.0, 1.0]
    stops:
      - { t: 0.0, color: "#000033" }
      - { t: 0.15, color: "#000066" }
      - { t: 0.3, color: "#0066ff" }
      - { t: 0.5, color: "#00ccff" }
      - { t: 0.7, color: "#ffffff" }
      - { t: 0.85, color: "#ff6600" }
      - { t: 1.0, color: "#ff3300" }

initial_state:
  type: "script"
  code: |
    const u = buffers.u;
    const v = buffers.v;
    u.fill(1.0);
    v.fill(0.0);
    const cx = Math.floor(width / 2);
    const cy = Math.floor(height / 2);
    const r = Math.max(4, Math.floor(width / 16));
    for (let y = cy - r; y <= cy + r; y++) {
      for (let x = cx - r; x <= cx + r; x++) {
        if (x >= 0 && x < width && y >= 0 && y < height) {
          const idx = y * width + x;
          u[idx] = 0.5 + (Math.random() - 0.5) * 0.1;
          v[idx] = 0.25 + (Math.random() - 0.5) * 0.1;
        }
      }
    }

ai_context:
  description: "Gray-Scott reaction-diffusion with chemicals U and V"
  hints:
    - "U is the substrate (feed), V is the activator"
    - "F controls the feed rate, k controls the kill rate"
    - "Du and Dv are diffusion rates for U and V respectively"
    - "Different F and k values produce different pattern types"
