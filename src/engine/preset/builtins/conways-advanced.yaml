# Conway's Advanced — GoL with operator-driven visual effects.
# GPU-native via Python transpiler → IR → WGSL.

schema_version: "1"

meta:
  name: "Conway's Advanced"
  author: "Lattice Engine"
  description: "GoL with age-fading, position-based color, and death-by-age operators."
  tags: ["2d", "ops", "visual", "advanced"]

grid:
  dimensionality: "2d"
  width: 128
  height: 128
  topology: "toroidal"

cell_properties:
  - name: "alive"
    type: "bool"
    default: 0
    role: "input_output"

params:
  - name: "maxAge"
    label: "Max Age"
    type: "int"
    default: 200
    min: 20
    max: 1000
    step: 10
  - name: "fadeDuration"
    label: "Fade Duration"
    type: "int"
    default: 50
    min: 5
    max: 200
    step: 5

rule:
  type: "webgpu"
  compute: |
    n = neighbor_sum_alive
    if n == 3 or (alive > 0.5 and n >= 2 and n < 4):
        self.alive = 1.0
        self.age = age + 1.0
    else:
        self.alive = 0.0
        self.age = 0.0

expression_tags:
  - name: "death-by-age"
    owner: { type: "cell-type", id: "default" }
    code: "self.alive = np.where(self.age > env_maxAge, 0.0, self.alive)"
    phase: "post-rule"
    source: "code"
    outputs: ["cell.alive"]
    inputs: ["cell.age"]

visual_mappings:
  - type: "script"
    code: |
      self.colorR = float(x) / float(width) * alive
      self.colorG = max(0.0, 1.0 - age / 100.0) * alive
      self.colorB = float(y) / float(height) * alive
      self.alpha = max(0.1, 1.0 - age / env_fadeDuration) * alive

initial_state:
  type: "script"
  code: |
    const buf = buffers.alive;
    for (let i = 0; i < width * height; i++) {
      if (Math.random() < 0.2) buf[i] = 1;
    }

ai_context:
  description: "Conway's GoL with operator-driven visual effects: age fading, position-based color, death-by-age"
  hints:
    - "Expression tags run as post-rule Python via Pyodide"
    - "colorR/G/B are inherent properties read by the renderer"
    - "Tags override the visual_mappings color when colorR+G+B > 0"
