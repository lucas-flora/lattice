# Fire — combustion with direct buoyancy transport + multi-stop color ramp.
# GPU-native via Python transpiler -> IR -> WGSL.

schema_version: "1"

meta:
  name: "Fire"
  author: "Lattice Engine"
  description: "Combustion simulation with fuel, smoke, direct buoyancy, and multi-stop color ramp."
  tags: ["2d", "continuous", "fire", "combustion"]

grid:
  dimensionality: "2d"
  width: 512
  height: 512
  topology: "toroidal"

cell_properties:
  - name: "temperature"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "fuel"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "smoke"
    type: "float"
    default: 0.0
    role: "input_output"

params:
  - name: "diffusion"
    label: "Diffusion"
    type: "float"
    default: 0.15
    min: 0.01
    max: 0.5
    step: 0.01
  - name: "burnRate"
    label: "Burn Rate"
    type: "float"
    default: 0.03
    min: 0.001
    max: 0.2
    step: 0.005
  - name: "coolingRate"
    label: "Cooling Rate"
    type: "float"
    default: 0.01
    min: 0.001
    max: 0.1
    step: 0.001
  - name: "ignitionTemp"
    label: "Ignition Temp"
    type: "float"
    default: 0.12
    min: 0.01
    max: 0.5
    step: 0.01
  - name: "buoyancy"
    label: "Buoyancy"
    type: "float"
    default: 0.4
    min: 0.0
    max: 1.0
    step: 0.05
  - name: "smokeRate"
    label: "Smoke Rate"
    type: "float"
    default: 0.02
    min: 0.001
    max: 0.1
    step: 0.005
  - name: "dt"
    label: "Time Step"
    type: "float"
    default: 1.0
    min: 0.1
    max: 3.0
    step: 0.1

rule:
  type: "webgpu"
  compute: |
    # Diffusion: standard Laplacian for heat and smoke
    lap_t = neighbor_at(0,-1,temperature) + neighbor_at(0,1,temperature) + neighbor_at(-1,0,temperature) + neighbor_at(1,0,temperature) - 4.0 * temperature
    lap_s = neighbor_at(0,-1,smoke) + neighbor_at(0,1,smoke) + neighbor_at(-1,0,smoke) + neighbor_at(1,0,smoke) - 4.0 * smoke

    # Buoyancy: direct upward transport — pull heat/smoke from cell below
    # neighbor_at(0,-1,...) = cell below (lower Y), neighbor_at(0,1,...) = cell above (higher Y)
    temp_below = neighbor_at(0, -1, temperature)
    temp_above = neighbor_at(0, 1, temperature)
    smoke_below = neighbor_at(0, -1, smoke)
    smoke_above = neighbor_at(0, 1, smoke)
    rise = env_buoyancy * env_dt
    buoy_t = rise * (temp_below - temp_above) * 0.5
    buoy_s = rise * (smoke_below - smoke_above) * 0.5

    # Combustion: fuel + heat -> more heat + smoke
    burning = step(env_ignitionTemp, temperature) * step(0.001, fuel)
    fuel_consumed = burning * env_burnRate * env_dt
    heat_generated = fuel_consumed * 5.0
    smoke_generated = fuel_consumed * env_smokeRate * 10.0

    # Temperature: diffusion + buoyancy + combustion - cooling
    new_temp = clamp(temperature + env_dt * env_diffusion * lap_t + buoy_t + heat_generated - env_coolingRate * env_dt, 0.0, 1.0)

    # Smoke: diffusion + buoyancy + generation - fade
    new_smoke = clamp(smoke + env_dt * env_diffusion * lap_s * 0.5 + buoy_s + smoke_generated - 0.003 * env_dt, 0.0, 1.0)

    # Fuel: consumed by burning
    new_fuel = clamp(fuel - fuel_consumed, 0.0, 1.0)

    # Color: blend fuel brown + temperature fire gradient + smoke gray
    t = clamp(new_temp, 0.0, 1.0)
    fuel_vis = step(0.001, new_fuel) * (1.0 - t)
    fire_r = t * mix(0.1, 1.0, smoothstep(0.0, 0.4, t))
    fire_g = t * smoothstep(0.3, 0.8, t)
    fire_b = t * smoothstep(0.7, 1.0, t)
    self.colorR = fire_r + fuel_vis * 0.35
    self.colorG = fire_g + fuel_vis * 0.18
    self.colorB = fire_b + fuel_vis * 0.05
    self.alpha = clamp(t * 8.0 + new_smoke * 2.0 + step(0.001, new_fuel), 0.0, 1.0)

    self.temperature = new_temp
    self.fuel = new_fuel
    self.smoke = new_smoke

visual_mappings:
  - property: "temperature"
    channel: "color"
    mapping:
      min: "#000000"
      max: "#ff6600"

ai_context:
  description: "Fire simulation: combustion with direct buoyancy transport"
  hints:
    - "Temperature drives color via multi-stop ramp (black -> red -> orange -> white)"
    - "Buoyancy pulls heat/smoke from cell below — direct transport, no velocity field"
    - "Fuel is consumed during burning, generating heat and smoke"
    - "Smoke rises, diffuses, and fades over time"
    - "Paint fuel with draw tool, click to ignite"
