# Fire — staged fluid-combustion simulation with velocity field.
# GPU-native via Python transpiler -> IR -> WGSL.
# Physics: upwind advection, diffusion, combustion, buoyancy, pressure projection, cooling.
# Colors computed by visual_mapping script (not the rule).

schema_version: "1"

meta:
  name: "Fire"
  author: "Lattice Engine"
  description: "Combustion simulation with velocity field, buoyancy, and GPU-compiled visual mapping."
  tags: ["2d", "continuous", "fire", "combustion", "fluid"]

grid:
  dimensionality: "2d"
  width: 512
  height: 512
  topology: "finite"

draw_property: "fuel"

cell_properties:
  - name: "vx"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "vy"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "temperature"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "fuel"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "smoke"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "pressure"
    type: "float"
    default: 0.0
    role: "input_output"
  - name: "curl"
    type: "float"
    default: 0.0
    role: "input_output"

params:
  - name: "dt"
    label: "Time Step"
    type: "float"
    default: 0.1
    min: 0.01
    max: 0.5
    step: 0.01
  - name: "diffusion_rate"
    label: "Diffusion"
    type: "float"
    default: 0.0002
    min: 0.0
    max: 0.01
    step: 0.0001
  - name: "burn_rate"
    label: "Burn Rate"
    type: "float"
    default: 3.0
    min: 0.1
    max: 10.0
    step: 0.1
  - name: "heat_generation"
    label: "Heat Generation"
    type: "float"
    default: 15.0
    min: 1.0
    max: 50.0
    step: 1.0
  - name: "smoke_generation"
    label: "Smoke Generation"
    type: "float"
    default: 1.5
    min: 0.0
    max: 5.0
    step: 0.1
  - name: "buoyancy_factor"
    label: "Buoyancy"
    type: "float"
    default: 1.5
    min: 0.0
    max: 5.0
    step: 0.1
  - name: "cooling_rate"
    label: "Cooling Rate"
    type: "float"
    default: 1.2
    min: 0.1
    max: 5.0
    step: 0.1
  - name: "smoke_dissipation"
    label: "Smoke Dissipation"
    type: "float"
    default: 0.15
    min: 0.01
    max: 2.0
    step: 0.05
  - name: "ignition_threshold"
    label: "Ignition Temp"
    type: "float"
    default: 0.5
    min: 0.1
    max: 2.0
    step: 0.1
  - name: "vorticity_strength"
    label: "Vorticity"
    type: "float"
    default: 15.0
    min: 0.0
    max: 40.0
    step: 0.5
  - name: "max_temp"
    label: "Max Temperature"
    type: "float"
    default: 5.0
    min: 1.0
    max: 20.0
    step: 0.5

rule:
  type: "webgpu"
  stages:
    # Stage 1: Upwind advection — move fields along velocity
    - name: "advection"
      compute: |
        # Upwind advection for temperature, fuel, smoke
        # Select upstream neighbor based on velocity direction
        up_t = mix(neighbor_at(0, -1, temperature), neighbor_at(0, 1, temperature), step(0.0, vy))
        lr_t = mix(neighbor_at(-1, 0, temperature), neighbor_at(1, 0, temperature), step(0.0, vx))
        up_f = mix(neighbor_at(0, -1, fuel), neighbor_at(0, 1, fuel), step(0.0, vy))
        lr_f = mix(neighbor_at(-1, 0, fuel), neighbor_at(1, 0, fuel), step(0.0, vx))
        up_s = mix(neighbor_at(0, -1, smoke), neighbor_at(0, 1, smoke), step(0.0, vy))
        lr_s = mix(neighbor_at(-1, 0, smoke), neighbor_at(1, 0, smoke), step(0.0, vx))
        spd = clamp((abs(vx) + abs(vy)) * env_dt, 0.0, 0.45)
        self.temperature = mix(temperature, (up_t + lr_t) * 0.5, spd)
        self.fuel = fuel
        self.smoke = mix(smoke, (up_s + lr_s) * 0.5, spd)
        # Advect velocity itself
        up_vx = mix(neighbor_at(0, -1, vx), neighbor_at(0, 1, vx), step(0.0, vy))
        lr_vx = mix(neighbor_at(-1, 0, vx), neighbor_at(1, 0, vx), step(0.0, vx))
        up_vy = mix(neighbor_at(0, -1, vy), neighbor_at(0, 1, vy), step(0.0, vy))
        lr_vy = mix(neighbor_at(-1, 0, vy), neighbor_at(1, 0, vy), step(0.0, vx))
        self.vx = mix(vx, (up_vx + lr_vx) * 0.5, spd)
        self.vy = mix(vy, (up_vy + lr_vy) * 0.5, spd)

    # Stage 2: Diffusion + Combustion + Buoyancy
    - name: "forces"
      compute: |
        # Diffusion: Laplacian for temperature and smoke
        lap_t = neighbor_at(1,0,temperature) + neighbor_at(-1,0,temperature) + neighbor_at(0,1,temperature) + neighbor_at(0,-1,temperature) - 4.0 * temperature
        lap_s = neighbor_at(1,0,smoke) + neighbor_at(-1,0,smoke) + neighbor_at(0,1,smoke) + neighbor_at(0,-1,smoke) - 4.0 * smoke
        new_temp = temperature + env_diffusion_rate * lap_t
        new_smoke = smoke + env_diffusion_rate * lap_s * 0.5
        # Combustion: fuel + heat -> more heat + smoke
        burning = step(env_ignition_threshold, new_temp) * step(0.001, fuel)
        burn_amount = min(fuel, env_burn_rate * env_dt) * burning
        new_temp = new_temp + burn_amount * env_heat_generation
        new_smoke = new_smoke + burn_amount * env_smoke_generation
        new_fuel = fuel - burn_amount
        # Buoyancy: hot gas rises (negative vy = upward in screen coords)
        self.vy = vy - env_buoyancy_factor * new_temp * env_dt
        self.vx = vx
        self.temperature = clamp(new_temp, 0.0, env_max_temp)
        self.fuel = clamp(new_fuel, 0.0, 1.0)
        self.smoke = clamp(new_smoke, 0.0, 1.0)

    # Stage 3: Pressure solve — store divergence in curl (reused), reset pressure
    - name: "pressure_setup"
      compute: |
        # Store velocity divergence in curl field (curl unused until vorticity M4)
        self.curl = (neighbor_at(1,0,vx) - neighbor_at(-1,0,vx) + neighbor_at(0,1,vy) - neighbor_at(0,-1,vy)) * 0.5
        self.pressure = 0.0

    # Stage 4: Jacobi iteration for pressure (reads divergence from curl)
    - name: "pressure_jacobi"
      iterations: 10
      compute: |
        # One Jacobi iteration: p = (sum_neighbors(p) - divergence) / 4
        p_sum = neighbor_at(1,0,pressure) + neighbor_at(-1,0,pressure) + neighbor_at(0,1,pressure) + neighbor_at(0,-1,pressure)
        self.pressure = (p_sum - curl) * 0.25

    # Stage 5: Pressure projection — subtract pressure gradient from velocity
    - name: "pressure_project"
      compute: |
        grad_px = (neighbor_at(1,0,pressure) - neighbor_at(-1,0,pressure)) * 0.5
        grad_py = (neighbor_at(0,1,pressure) - neighbor_at(0,-1,pressure)) * 0.5
        self.vx = vx - grad_px
        self.vy = vy - grad_py

    # Stage 6: Vorticity compute — curl of velocity field
    - name: "vorticity_compute"
      compute: |
        # Curl = dvy/dx - dvx/dy (scalar in 2D)
        self.curl = (neighbor_at(1,0,vy) - neighbor_at(-1,0,vy)) * 0.5 - (neighbor_at(0,1,vx) - neighbor_at(0,-1,vx)) * 0.5

    # Stage 7: Vorticity confinement — re-inject rotational energy
    - name: "vorticity_apply"
      compute: |
        # Gradient of |curl| — points from low to high vorticity
        eta_x = abs(neighbor_at(1,0,curl)) - abs(neighbor_at(-1,0,curl))
        eta_y = abs(neighbor_at(0,1,curl)) - abs(neighbor_at(0,-1,curl))
        eta_len = sqrt(eta_x * eta_x + eta_y * eta_y) + 0.00001
        nx = eta_x / eta_len
        ny = eta_y / eta_len
        # Confinement force: cross product of normalized eta with curl
        self.vx = vx + env_vorticity_strength * ny * curl * env_dt
        self.vy = vy + env_vorticity_strength * (0.0 - nx) * curl * env_dt

    # Stage 8: Cooling and decay
    - name: "cooling"
      compute: |
        self.temperature = clamp(temperature * (1.0 - env_cooling_rate * env_dt), 0.0, env_max_temp)
        self.smoke = clamp(smoke * (1.0 - env_smoke_dissipation * env_dt), 0.0, 1.0)
        # Clamp velocity for numerical stability
        self.vx = clamp(vx * 0.998, -5.0, 5.0)
        self.vy = clamp(vy * 0.998, -5.0, 5.0)

visual_mappings:
  - type: "script"
    code: |
      t = clamp(temperature / env_max_temp, 0.0, 1.0)
      # Fire: black → dark red → orange → yellow-white (red always dominant)
      fr = smoothstep(0.0, 0.15, t)
      fg = t * t * 0.7
      fb = pow(t, 4.0) * 0.5
      # Fuel: dark brown, fades as temperature rises
      fuel_show = step(0.01, fuel) * (1.0 - smoothstep(0.0, 0.2, t))
      # Smoke: gray wisps, visible where not hot
      smoke_show = clamp(smoke, 0.0, 1.0) * (1.0 - t)
      gray = 0.3 + smoke * 0.1
      # Combine layers
      self.colorR = fr + fuel_show * 0.22 + smoke_show * gray
      self.colorG = fg + fuel_show * 0.11 + smoke_show * gray
      self.colorB = fb + fuel_show * 0.03 + smoke_show * (gray + 0.02)
      self.alpha = clamp(t * 4.0 + smoke_show + fuel_show, 0.0, 1.0)

ai_context:
  description: "Fire: staged fluid-combustion with velocity field and GPU visual mapping"
  hints:
    - "6 compute stages per tick: advection, forces, pressure setup, Jacobi x10, projection, cooling"
    - "Color computed by visual_mapping script, not the rule"
    - "Buoyancy adds upward velocity proportional to temperature"
    - "Pressure projection enforces incompressibility"
    - "Paint fuel with draw tool to add combustible material"
