# Brian's Brain — GPU-native via Python transpiler → IR → WGSL.

schema_version: "1"

meta:
  name: "Brian's Brain"
  author: "Brian Silverman"
  description: "A 3-state cellular automaton: off, on, dying. Creates chaotic activity."
  tags: ["2d", "3-state", "chaotic"]

grid:
  dimensionality: "2d"
  width: 128
  height: 128
  topology: "toroidal"

cell_properties:
  - name: "state"
    type: "int"
    default: 0
    role: "input_output"

rule:
  type: "webgpu"
  compute: |
    n = neighbor_count(state, 1)
    if state > 0.5 and state < 1.5:
        self.state = 2.0
    elif state > 1.5:
        self.state = 0.0
    else:
        if n == 2:
            self.state = 1.0
        else:
            self.state = 0.0

visual_mappings:
  - property: "state"
    channel: "color"
    mapping:
      "0": "#000000"
      "1": "#ffffff"
      "2": "#0066ff"

initial_state:
  type: "script"
  code: |
    const buf = buffers.state;
    for (let i = 0; i < width * height; i++) {
      if (Math.random() < 0.2) buf[i] = 1;
    }

ai_context:
  description: "Brian's Brain with 3 states: off (0), on (1), dying (2)"
  hints:
    - "On cells always become dying next tick"
    - "Dying cells always become off next tick"
    - "Off cells turn on if exactly 2 neighbors are on"
