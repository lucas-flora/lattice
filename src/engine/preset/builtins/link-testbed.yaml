# Link Testbed — GPU-native via Python transpiler → IR → WGSL.

schema_version: "1"

meta:
  name: "Link Testbed"
  author: "Lattice Engine"
  description: "Test preset for parameter linking. GoL with age tracking, alpha fading, and linked params."
  tags: ["test", "linking", "2d"]

grid:
  dimensionality: "2d"
  width: 64
  height: 64
  topology: "toroidal"

cell_properties:
  - name: "alive"
    type: "bool"
    default: 0
    role: "input_output"
  - name: "age"
    type: "int"
    default: 0
    role: "output"
  - name: "alpha"
    type: "float"
    default: 1.0
    role: "output"

params:
  - name: "surviveMin"
    label: "Survive Min"
    type: "int"
    default: 2
    min: 0
    max: 8
    step: 1
  - name: "surviveMax"
    label: "Survive Max"
    type: "int"
    default: 3
    min: 0
    max: 8
    step: 1
  - name: "birthCount"
    label: "Birth Count"
    type: "int"
    default: 3
    min: 0
    max: 8
    step: 1
  - name: "fadeSpeed"
    label: "Fade Speed"
    type: "float"
    default: 50.0
    min: 5.0
    max: 200.0
    step: 5.0

parameter_links:
  - source: "cell.age"
    target: "cell.alpha"
    sourceRange: [0, 50]
    targetRange: [1, 0]
    easing: "smoothstep"

rule:
  type: "webgpu"
  compute: |
    n = neighbor_sum_alive
    if (alive > 0.5 and n >= env_surviveMin and n <= env_surviveMax) or (alive < 0.5 and n == env_birthCount):
        self.alive = 1.0
        self.age = age + 1.0
    else:
        self.alive = 0.0
        self.age = 0.0

visual_mappings:
  - type: "script"
    code: |
      self.colorR = 0.0
      self.colorG = alive
      self.colorB = 0.0

initial_state:
  type: "script"
  code: |
    const buf = buffers.alive;
    for (let i = 0; i < width * height; i++) {
      if (Math.random() < 0.2) buf[i] = 1;
    }
